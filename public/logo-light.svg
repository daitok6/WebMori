<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 40" fill="none">
  <!-- Icon mark (scaled to 36px height, 2px padding) -->
  <g transform="translate(2,2) scale(0.783)">
    <!-- Connecting lines -->
    <g stroke="#C9A84C" stroke-width="2.2" stroke-linecap="round">
      <line x1="15.2" y1="20" x2="18.8" y2="33"/>
      <line x1="32.8" y1="20" x2="29.2" y2="33"/>
      <line x1="10"   y1="11" x2="24"   y2="7"/>
      <line x1="38"   y1="11" x2="24"   y2="7"/>
    </g>
    <!-- Top connector node -->
    <circle cx="24" cy="7" r="2.5" fill="#C9A84C"/>
    <!-- Left hexagon -->
    <path fill="#C9A84C" fill-rule="evenodd"
      d="M10,11 L15.2,14 L15.2,20 L10,23 L4.8,20 L4.8,14 Z
         M12.5,17 a2.5,2.5 0 1,0 -5,0 a2.5,2.5 0 1,0 5,0 Z"/>
    <!-- Right hexagon -->
    <path fill="#C9A84C" fill-rule="evenodd"
      d="M38,11 L43.2,14 L43.2,20 L38,23 L32.8,20 L32.8,14 Z
         M40.5,17 a2.5,2.5 0 1,0 -5,0 a2.5,2.5 0 1,0 5,0 Z"/>
    <!-- Center hexagon -->
    <path fill="#C9A84C" fill-rule="evenodd"
      d="M24,30 L29.2,33 L29.2,39 L24,42 L18.8,39 L18.8,33 Z
         M26.5,36 a2.5,2.5 0 1,0 -5,0 a2.5,2.5 0 1,0 5,0 Z"/>
  </g>

  <!-- Wordmark: "webmori" in white -->
  <text
    x="46" y="26"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="700"
    font-size="20"
    letter-spacing="-0.4"
    fill="#FFFFFF">webmori</text>
</svg>
